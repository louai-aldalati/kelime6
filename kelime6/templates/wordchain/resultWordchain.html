<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kelime Zinciri - Sonuç</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(to right, #6a11cb, #2575fc);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .dashboard-container {
      width: 90%;
      height: 90vh;
      background: #fff;
      border-radius: 10px;
      display: flex;
      overflow: hidden;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    }
    
    /* Main Content */
    .main-content { flex: 1; padding: 2rem; overflow-y: auto; display: flex; flex-direction: column; }
    .result-title { font-size: 1.5rem; color: #333; margin-bottom: 1rem; text-align: center; }
    .story-section { background: #f9f9f9; padding: 1rem; border-radius: 5px; margin-bottom: 1.5rem; }
    .story-section img { max-width: 100%; border-radius: 5px; margin-top: 0.5rem; }
    .entries-section { margin-bottom: 1.5rem; }
    .entries-section h3 { font-size: 1.2rem; color: #333; margin-bottom: 0.5rem; }
    .entries-list { list-style: none; padding-left: 0; }
    .entries-list li { background: #fff; padding: 0.75rem; border: 1px solid #ececec; border-radius: 5px; margin-bottom: 0.5rem; }
    .footer-links { margin-top: auto; text-align: center; padding-top: 1rem; }
    .footer-links button { padding: 0.75rem 1.5rem; background-color: #2575fc; color: #fff; border: none; border-radius: 5px; cursor: pointer; font-size: 1rem; margin: 0 0.5rem; transition: background-color 0.3s; }
    .footer-links button:hover { background-color: #1a5dc9; }
  </style>
</head>
<body>
  <div class="dashboard-container">
    {# تضمين الشريط الجانبي #}
    {% include 'sideNavbar.html' %}

    <main class="main-content">
      <div class="result-title">Oyun Sonuçları</div>
      <div class="story-section">
  <h3>Oluşturulan Hikaye:</h3>
  <p id="storyText">{{ story_text }}</p>
  <img id="storyImage" src="{{ story_image_url }}" alt="Story Image" />
</div>
<div class="entries-section">
  <h3>Zincirdeki Kelimeler:</h3>
  <ul class="entries-list" id="entriesList">
    {% for w in entries %}
      <li>{{ forloop.counter }}. {{ w }}</li>
    {% endfor %}
  </ul>
</div>
  
      <div class="footer-links">
        <button onclick="location.href='/wordchain'">Ana Sayfaya Dön</button>
        <button onclick="location.href='/wordchain/playWordchain'">Tekrar Oyna</button>
      </div>
      {# تضمين التذييل #}
      {% include 'footer.html' %}
    </main>
  </div>
  <script>
    // TODO: Dinamik veri yükleme: storyText, storyImage.src, entriesList
  </script>
</body>
</html>
